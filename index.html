<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVibe — Watch Free Movies & TV Shows Online</title>
  <meta name="description" content="CineVibe — Stream the latest movies, TV shows, and anime for free in HD quality." />
  <meta name="keywords" content="watch movies online, free streaming, TV shows, anime, CineVibe" />
  <meta property="og:title" content="CineVibe — Free Movie & TV Streaming" />
  <meta property="og:description" content="Stream movies and TV shows for free in HD." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar" id="navbar">
    <a href="#/" class="navbar-logo" id="logo-link">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="#e5173f"/>
          <polygon points="16,12 30,20 16,28" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">CineVibe</span>
    </a>

    <div class="navbar-nav">
      <a href="#/" class="nav-link" id="nav-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="#/api" class="nav-link" id="nav-api">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        API
      </a>
      <div class="browse-wrapper">
        <button class="nav-link browse-btn" id="browse-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Browse
          <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="browse-dropdown" id="browse-dropdown"></div>
      </div>
    </div>

    <div class="navbar-actions">
      <button class="icon-btn" id="search-btn" title="Search" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" id="auth-btn" title="Account" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn hamburger" id="mobile-menu-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </nav>

  <!-- ── MAIN APP ── -->
  <main id="app"></main>

  <!-- ── SEARCH OVERLAY ── -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-container">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search movies, TV shows, anime..." autocomplete="off" spellcheck="false" />
        <button class="search-close" id="search-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <!-- ── AUTH MODAL ── -->
  <div class="modal-backdrop" id="auth-modal">
    <div class="modal-card">
      <button class="modal-close-btn" id="auth-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-tabs">
        <button class="modal-tab active" id="tab-login" data-tab="login">Login</button>
        <button class="modal-tab" id="tab-signup" data-tab="signup">Sign up</button>
      </div>

      <div class="modal-form" id="form-login">
        <div class="field-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="login-username" placeholder="Username" />
        </div>
        <div class="field-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="login-password" placeholder="Password" />
        </div>
        <a href="#" class="forgot-link">Forgot your password?</a>
        <div class="modal-btns">
          <button class="btn-primary full" id="login-submit">Login</button>
          <button class="btn-dark full" id="login-cancel">Cancel</button>
        </div>
      </div>

      <div class="modal-form hidden" id="form-signup">
        <div class="field-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="signup-username" placeholder="Username" />
        </div>
        <div class="field-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="signup-email" placeholder="Email" />
        </div>
        <div class="field-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="signup-password" placeholder="Password" />
        </div>
        <div class="modal-btns">
          <button class="btn-primary full" id="signup-submit">Create Account</button>
          <button class="btn-dark full" id="signup-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <!-- ── SCRIPTS ── -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
